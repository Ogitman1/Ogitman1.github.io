<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realidade Virtual</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
</head>
<body>
<nav style="display: inline-flex; justify-content: center;align-items: center ; text-align: center;
margin: 0; padding: 0; width: 100vw; height: 12vh;">
    <h1 style="font-size: 30px; font-family: 'Courier New', Courier, monospace; letter-spacing: 3px;">Experimente a realidade virtual</h1>
</nav>
  <a-scene>
    <!-- Adicione seus elementos de realidade virtual aqui -->
    <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
    <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
    <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
    <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
  </a-scene>
</body>
</html>
